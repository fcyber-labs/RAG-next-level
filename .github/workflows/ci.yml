name: RAG Pipeline CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # 1. Code Quality — uses .flake8 config committed to repo
  # ─────────────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Discover source directories
        id: dirs
        run: |
          DIRS=""
          for d in dags streamlit_app scripts; do
            [ -d "$d" ] && DIRS="$DIRS $d"
          done
          [ -z "$DIRS" ] && DIRS="."
          echo "dirs=$DIRS" >> $GITHUB_OUTPUT
          echo "Linting: $DIRS"

      - name: flake8 (reads .flake8 config from repo root)
        run: flake8 ${{ steps.dirs.outputs.dirs }}

      - name: black — format check (warn only)
        run: |
          black --check --line-length=120 \
            --exclude='/(\.git|__pycache__|\.venv|venv)/' \
            ${{ steps.dirs.outputs.dirs }}
        continue-on-error: true

      - name: isort — import order (warn only)
        run: |
          isort --check-only --line-length=120 \
            --skip __pycache__ --skip .venv --skip venv \
            ${{ steps.dirs.outputs.dirs }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Airflow DAG Integrity
  #
  # Fixes vs previous version:
  #   - sys.path.insert(0, 'dags') so `from tasks.xxx import` resolves
  #   - MagicMock stubs (not plain ModuleType) so attribute access like
  #     `from qdrant_client import QdrantClient` works without error
  #   - numpy stubbed (not installed in this slim job)
  # ─────────────────────────────────────────────────────────────────────────
  airflow-dag-integrity:
    name: Airflow DAG Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow (slim — no ML packages)
        run: |
          python -m pip install --upgrade pip
          pip install \
            "apache-airflow==2.8.1" \
            "python-dotenv==1.0.0" \
            "pydantic==2.5.3" \
            --constraint \
            "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt"

      - name: Create .env from template
        run: cp .env.example .env

      - name: Syntax-check all DAG files
        run: |
          echo "Checking Python syntax..."
          find dags/ -name "*.py" -print0 | xargs -0 python -m py_compile
          echo "✅ No syntax errors"

      - name: Import-check DAGs via DagBag
        run: |
          python - <<'PYEOF'
          import sys
          import os
          from unittest.mock import MagicMock

          # ── 1. Airflow needs dags/ on sys.path so DAG files can do
          #        `from tasks.xxx import yyy` (relative to the dags/ folder)
          sys.path.insert(0, "dags")

          # ── 2. SQLAlchemy 2.x compat: strip deprecated `encoding` kwarg
          import sqlalchemy
          _orig = sqlalchemy.create_engine
          def _patched(*a, **kw):
              kw.pop("encoding", None)
              return _orig(*a, **kw)
          sqlalchemy.create_engine = _patched
          try:
              import sqlalchemy.engine.create as _ce
              _ce.create_engine = _patched
          except Exception:
              pass

          # ── 3. Stub every heavy package with MagicMock so attribute
          #        access like `from qdrant_client import QdrantClient` works
          STUBS = [
              "numpy", "numpy.linalg", "numpy.random",
              "qdrant_client", "qdrant_client.models",
              "qdrant_client.http", "qdrant_client.http.models",
              "qdrant_client.http.exceptions",
              "sentence_transformers",
              "groq",
              "mlflow", "mlflow.tracking",
              "tiktoken",
              "tenacity",
              "openai",
              "redis",
              "langchain", "langchain.text_splitter",
              "langchain_community",
              "langchain_community.document_loaders",
              "boto3", "botocore", "botocore.exceptions",
              "aiohttp",
              "prometheus_client",
              "psycopg2", "psycopg2.extras",
              "sklearn", "sklearn.preprocessing",
              "streamlit",
          ]
          for name in STUBS:
              if name not in sys.modules:
                  stub = MagicMock()
                  stub.__name__ = name
                  stub.__path__ = []
                  stub.__spec__ = None
                  sys.modules[name] = stub

          # ── 4. Airflow env
          os.environ.setdefault("AIRFLOW_HOME", "/tmp/airflow_dag_ci")
          os.environ.setdefault(
              "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN",
              "sqlite:////tmp/airflow_dag_ci/airflow.db",
          )
          os.environ.setdefault("AIRFLOW__CORE__LOAD_EXAMPLES", "false")
          os.makedirs("/tmp/airflow_dag_ci", exist_ok=True)

          # ── 5. Init DB (needed for DagBag)
          from airflow.utils.db import initdb
          initdb()

          # ── 6. Load and inspect DAGs
          from airflow.models import DagBag
          bag = DagBag(dag_folder="dags/", include_examples=False)

          if bag.import_errors:
              print("❌ DAG import errors:")
              for dag_file, err in bag.import_errors.items():
                  print(f"  {dag_file}:\n    {err}\n")
              sys.exit(1)

          print(f"✅ {len(bag.dags)} DAG(s) loaded successfully:")
          for dag_id in sorted(bag.dags.keys()):
              print(f"   - {dag_id}")
          PYEOF

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Docker Build Validation — config check only (no full build)
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from template
        run: cp .env.example .env

      - name: Locate docker-compose file
        id: compose
        run: |
          if   [ -f "docker/docker-compose.yml" ]; then
            echo "file=docker/docker-compose.yml" >> $GITHUB_OUTPUT
            echo "dir=docker"                     >> $GITHUB_OUTPUT
          elif [ -f "docker-compose.yml" ]; then
            echo "file=docker-compose.yml"        >> $GITHUB_OUTPUT
            echo "dir=."                          >> $GITHUB_OUTPUT
          else
            echo "file="  >> $GITHUB_OUTPUT
            echo "dir=."  >> $GITHUB_OUTPUT
          fi

      - name: Validate docker-compose config
        if: steps.compose.outputs.file != ''
        run: |
          cd ${{ steps.compose.outputs.dir }}
          docker compose --env-file ../.env config --quiet \
            || docker compose --env-file .env config --quiet \
            || docker compose config --quiet

      - name: Check Dockerfile(s) exist
        run: |
          count=$(find . -name "Dockerfile*" | grep -v ".git" | wc -l)
          echo "Found $count Dockerfile(s):"
          find . -name "Dockerfile*" | grep -v ".git"
          [ "$count" -gt 0 ] || { echo "❌ No Dockerfiles found"; exit 1; }
          echo "✅ Dockerfile(s) present"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Documentation Validation
  # NOTE: data/benchmark_queries.json must be committed to the repo.
  #       Run: git add data/benchmark_queries.json && git commit && git push
  # ─────────────────────────────────────────────────────────────────────────
  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "README.md"
            "requirements.txt"
            ".env.example"
            "data/benchmark_queries.json"
          )
          all_ok=true
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ $f MISSING"
              all_ok=false
            fi
          done
          $all_ok || { echo "❌ Missing required file(s)"; exit 1; }
          echo "✅ All required files present"

      - name: Validate benchmark_queries.json schema
        run: |
          python3 - <<'PYEOF'
          import json, sys

          with open("data/benchmark_queries.json") as f:
              data = json.load(f)

          assert isinstance(data, list), \
              f"Expected top-level array, got {type(data).__name__}"
          assert len(data) >= 10, \
              f"Need ≥10 queries, got {len(data)}"

          required = {"query", "expected_docs", "category", "difficulty"}
          for i, q in enumerate(data):
              missing = required - q.keys()
              assert not missing, f"Query #{i} missing fields {missing}"
              assert isinstance(q["expected_docs"], list) and q["expected_docs"], \
                  f"Query #{i}: expected_docs must be a non-empty list"

          cats = sorted({q["category"] for q in data})
          print(f"✅ benchmark_queries.json — {len(data)} queries, categories: {cats}")
          PYEOF

      - name: Check .env.example is populated
        run: |
          lines=$(grep -c "=" .env.example || true)
          echo ".env.example has $lines variable definitions"
          [ "$lines" -gt 0 ] || { echo "❌ .env.example appears empty"; exit 1; }
          echo "✅ .env.example OK"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Unit Tests
  #
  # tests/conftest.py stubs all heavy packages (tiktoken, qdrant_client,
  # groq, sentence_transformers, tenacity …) so every test module can be
  # collected without those packages being installed.
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pytest==7.4.4" \
            "pytest-cov==4.1.0" \
            "pytest-mock==3.12.0" \
            "python-dotenv==1.0.0" \
            "pydantic==2.5.3" \
            "rank-bm25==0.2.2" \
            "numpy==1.26.3" \
            "scikit-learn==1.4.0" \
            "requests==2.31.0" \
            "redis==4.6.0" \
            "sqlalchemy>=1.4,<2.0"

      - name: Run tests
        # test_dag_integrity is run in the dedicated airflow job above;
        # exclude it here to avoid the heavy airflow install.
        run: |
          pytest tests/ \
            --ignore=tests/test_dag_integrity.py \
            -v \
            --tb=short \
            --cov=dags \
            --cov-report=term-missing \
            --cov-fail-under=0
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ─────────────────────────────────────────────────────────────────────────
  # 6. CI Summary gate
  # ─────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - code-quality
      - airflow-dag-integrity
      - docker-build
      - docs-validation
      - unit-tests
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "code-quality         : ${{ needs.code-quality.result }}"
          echo "airflow-dag-integrity: ${{ needs.airflow-dag-integrity.result }}"
          echo "docker-build         : ${{ needs.docker-build.result }}"
          echo "docs-validation      : ${{ needs.docs-validation.result }}"
          echo "unit-tests           : ${{ needs.unit-tests.result }}"

          for result in \
            "${{ needs.code-quality.result }}" \
            "${{ needs.airflow-dag-integrity.result }}" \
            "${{ needs.docker-build.result }}" \
            "${{ needs.docs-validation.result }}" \
            "${{ needs.unit-tests.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ One or more critical jobs failed"
              exit 1
            fi
          done
          echo "✅ All CI checks passed"
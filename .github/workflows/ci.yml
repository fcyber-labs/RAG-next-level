name: RAG Pipeline CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ─────────────────────────────────────────────────────────────────
  # 1. Code Quality Checks
  # ─────────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip & install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint mypy

      - name: flake8 (syntax + style)
        run: |
          flake8 dags/ streamlit_app/ scripts/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git
        continue-on-error: false

      - name: black (formatting check)
        run: |
          black --check --line-length=120 \
            dags/ streamlit_app/ scripts/ \
            --exclude='/(\.git|__pycache__)/'

      - name: isort (import order check)
        run: |
          isort --check-only --line-length=120 \
            dags/ streamlit_app/ scripts/

  # ─────────────────────────────────────────────────────────────────
  # 2. Airflow DAG Integrity
  # ─────────────────────────────────────────────────────────────────
  airflow-dag-integrity:
    name: Airflow DAG Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install only Airflow + providers to keep this job fast.
      # We intentionally skip qdrant-client / sentence-transformers
      # (heavy ML packages) and use mocks for DAG import validation.
      - name: Install Airflow and providers
        run: |
          pip install \
            "apache-airflow==2.8.1" \
            "apache-airflow-providers-redis==3.5.0" \
            "apache-airflow-providers-postgres==5.10.0" \
            "apache-airflow-providers-amazon==8.16.0" \
            "python-dotenv==1.0.0" \
            "pydantic==2.5.3"

      - name: Create minimal .env for Airflow init
        run: |
          cp .env.example .env
          # Override DB connection to use SQLite for CI
          echo "AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////tmp/airflow_ci.db" >> .env
          echo "AIRFLOW__CORE__LOAD_EXAMPLES=false" >> .env

      - name: Initialise Airflow DB
        run: airflow db init
        env:
          AIRFLOW_HOME: /tmp/airflow_ci
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////tmp/airflow_ci.db"
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__CORE__DAGS_FOLDER: "${{ github.workspace }}/dags"

      - name: Validate DAGs (import check)
        run: |
          airflow dags list 2>&1 | tee /tmp/dag_list.txt
          # Fail if any DAG shows an import error
          if grep -i "error\|broken\|import" /tmp/dag_list.txt | grep -iv "no errors\|0 errors"; then
            echo "❌ One or more DAGs have import errors"
            exit 1
          fi
          echo "✅ All DAGs imported successfully"
        env:
          AIRFLOW_HOME: /tmp/airflow_ci
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "sqlite:////tmp/airflow_ci.db"
          AIRFLOW__CORE__LOAD_EXAMPLES: "false"
          AIRFLOW__CORE__DAGS_FOLDER: "${{ github.workspace }}/dags"

  # ─────────────────────────────────────────────────────────────────
  # 3. Docker Build Validation
  # FIX: copy .env.example → .env before docker-compose runs so
  #      compose can resolve variable substitutions without failing
  #      with "env file … not found".
  # ─────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── KEY FIX: create .env from the example template ──────────
      - name: Create .env from template
        run: cp .env.example .env

      - name: Validate docker-compose config
        run: |
          cd docker
          docker compose --env-file ../.env config --quiet
        # Only validates the YAML + variable resolution; does NOT
        # pull images or run containers (fast, no credentials needed).

      - name: Build Docker images (no cache)
        run: |
          cd docker
          docker compose --env-file ../.env build --no-cache
        env:
          DOCKER_BUILDKIT: "1"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # don't fail CI on findings; just report
        continue-on-error: true

      - name: Upload Trivy SARIF
        # Only upload when the file was actually created
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true  # fork PRs lack security-events write permission

  # ─────────────────────────────────────────────────────────────────
  # 4. Documentation Validation
  # FIX: adds data/benchmark_queries.json to the required-files list
  #      (it now exists in the repo after this PR).
  # ─────────────────────────────────────────────────────────────────
  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "README.md"
            "requirements.txt"
            ".env.example"
            "data/benchmark_queries.json"
          )

          all_ok=true
          for f in "${required_files[@]}"; do
            if [ -f "$f" ]; then
              echo "✓ $f exists"
            else
              echo "✗ $f missing"
              all_ok=false
            fi
          done

          if [ "$all_ok" = false ]; then
            echo ""
            echo "❌ One or more required files are missing. See above."
            exit 1
          fi
          echo ""
          echo "✅ All required files present"

      - name: Validate benchmark_queries.json schema
        run: |
          python3 - <<'EOF'
          import json

          with open("data/benchmark_queries.json") as f:
              data = json.load(f)

          # File is a top-level JSON array (not wrapped in an object)
          assert isinstance(data, list), \
              f"Expected a JSON array at top level, got {type(data).__name__}"
          assert len(data) >= 10, \
              f"Need ≥10 benchmark queries, got {len(data)}"

          required_fields = {"query", "expected_docs", "category", "difficulty"}
          for i, q in enumerate(data):
              missing = required_fields - q.keys()
              assert not missing, \
                  f"Query #{i} missing fields {missing}: {q}"
              assert isinstance(q["expected_docs"], list) and len(q["expected_docs"]) > 0, \
                  f"Query #{i} 'expected_docs' must be a non-empty list"

          categories = {q["category"] for q in data}
          print(f"✅ benchmark_queries.json valid — {len(data)} queries across categories: {sorted(categories)}")
          EOF

      - name: Validate .env.example completeness
        run: |
          python3 - <<'EOF'
          required_keys = [
              "OPENAI_API_KEY",
              "SLACK_WEBHOOK_URL",
              "QDRANT_HOST",
              "REDIS_HOST",
              "MLFLOW_TRACKING_URI",
              "RAG_EVAL_THRESHOLD",
              "RAG_COST_BUDGET_MONTHLY",
          ]
          with open(".env.example") as f:
              content = f.read()
          missing = [k for k in required_keys if k not in content]
          if missing:
              print(f"❌ Missing keys in .env.example: {missing}")
              raise SystemExit(1)
          print("✅ .env.example contains all required keys")
          EOF

  # ─────────────────────────────────────────────────────────────────
  # 5. Unit Tests
  # ─────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Install a lightweight subset sufficient for unit tests
          # (skips torch/sentence-transformers to keep CI fast)
          pip install \
            "pytest==7.4.4" \
            "pytest-cov==4.1.0" \
            "pytest-mock==3.12.0" \
            "python-dotenv==1.0.0" \
            "pydantic==2.5.3" \
            "rank-bm25==0.2.2" \
            "numpy==1.26.3" \
            "scikit-learn==1.4.0" \
            "requests==2.31.0" \
            "redis==4.6.0" \
            "mlflow==2.14.3" \
            "prometheus-client==0.19.0"

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --cov=dags \
            --cov=streamlit_app \
            --cov-report=term-missing \
            --cov-fail-under=60
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ─────────────────────────────────────────────────────────────────
  # 6. CI Summary gate
  # ─────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - code-quality
      - airflow-dag-integrity
      - docker-build
      - docs-validation
      - unit-tests
    if: always()
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.code-quality.result }}"
            "${{ needs.airflow-dag-integrity.result }}"
            "${{ needs.docker-build.result }}"
            "${{ needs.docs-validation.result }}"
            "${{ needs.unit-tests.result }}"
          )
          failed=false
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              failed=true
            fi
          done

          echo "code-quality       : ${{ needs.code-quality.result }}"
          echo "airflow-dag-integrity: ${{ needs.airflow-dag-integrity.result }}"
          echo "docker-build       : ${{ needs.docker-build.result }}"
          echo "docs-validation    : ${{ needs.docs-validation.result }}"
          echo "unit-tests         : ${{ needs.unit-tests.result }}"

          if [ "$failed" = true ]; then
            echo ""
            echo "❌ One or more critical jobs failed"
            exit 1
          fi
          echo ""
          echo "✅ All CI checks passed"
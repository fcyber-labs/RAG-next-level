[pytest]
# Add repo root to sys.path so `from dags.xxx import yyy` resolves locally.
# Requires pytest >= 7.0 (which this project uses).
pythonpath = .

# Default test discovery
testpaths = tests

# Coverage settings
addopts =
    --cov=dags
    --cov-report=term-missing
    --cov-fail-under=0

# Log level during tests
log_cli = false
log_level = WARNING